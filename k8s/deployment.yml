apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: terraform
  template:
    metadata:
      labels:
        app: terraform
    spec:
      containers:
      - name: terraform
        image: mubha/terraform:latest
        ports:
        - containerPort: 80
